<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusShop | Carrito Vacío</title>
    <link rel="icon" href="imagenes/logo.png" type="image/png">
    
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/carrito-vacio.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="main-header">
        <nav class="navbar">
            <div class="nav-logo">
                <a href="index.html" style="text-decoration:none; color:inherit;">
                    <h1>Campus<span>Shop</span></h1>
                </a>
            </div>
        </nav>
    </header>

    <main class="empty-cart-container">
        <div class="empty-cart-content">
            <div class="empty-illustration">
                <div class="cart-circle">
                    <span class="cart-icon">🛒</span>
                    <div class="plus-sign">+</div>
                </div>
            </div>

            <h2>Tu carrito está vacío</h2>
            <p>Parece que aún no has añadido nada a tu bolsa de compras. ¡Explora nuestro catálogo y encuentra algo increíble!</p>

            <a href="index.html" class="btn-back-to-shop">
                Volver al catálogo
            </a>
        </div>
    </main>

</body>
</html>
