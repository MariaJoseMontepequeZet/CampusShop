<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusShop | Historial de Pedidos</title>
    <link rel="icon" href="img/logo.png" type="image/png">

    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/historial.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
</head>

<body>

    <header class="main-header">
        <nav class="navbar">
            <div class="nav-logo">
                <a href="index.html" style="text-decoration:none; color:inherit;">
                    <h1>Campus<span>Shop</span></h1>
                </a>
            </div>
            <div class="nav-links">
                <a href="index.html">← Volver al inicio</a>
            </div>
        </nav>
    </header>

    <main class="history-container">
        <header class="history-header">
            <h2>Mis Pedidos</h2>
            <p style="color: #888888; font-size: 0.90rem;">Gestión de tus compras anteriores</p>
        </header>

        <article class="order-card">
            <div class="order-card-header">
                <div class="order-meta">
                    <h3>Orden #CS-99421</h3>
                    <span>10 de Abril, 2026</span>
                </div>
                <span class="status-badge delivered">Entregado</span>
            </div>
            <div class="order-content">
                <div class="order-items-preview">
                    <img src="img/camiseta-polo.png" alt="Polo Premium">
                    <img src="img/gorra.png" alt="Gorra Campus">
                </div>
                <div class="order-total-info">
                    <span class="total-amount">Q215.00</span>
                    <button class="btn-order-detail">Ver detalles</button>
                </div>
            </div>
        </article>

        <article class="order-card">
            <div class="order-card-header">
                <div class="order-meta">
                    <h3>Orden #CS-99380</h3>
                    <span>12 de Abril, 2026</span>
                </div>
                <span class="status-badge shipped">En camino</span>
            </div>
            <div class="order-content">
                <div class="order-items-preview">
                    <img src="img/mochila-tech.png" alt="Mochila Tech">
                </div>
                <div class="order-total-info">
                    <span class="total-amount">Q350.00</span>
                    <button class="btn-order-detail">Rastrear envío</button>
                </div>
            </div>
        </article>

        <article class="order-card">
            <div class="order-card-header">
                <div class="order-meta">
                    <h3>Orden #CS-99455</h3>
                    <span>Hoy, 09:45 AM</span>
                </div>
                <span class="status-badge processing">Procesando</span>
            </div>
            <div class="order-content">
                <div class="order-items-preview">
                    <img src="img/billetera-cuero.png" alt="Billetera de Cuero">
                    <img src="img/hoodie-o.png" alt="Sudadero Hoodie">
                </div>
                <div class="order-total-info">
                    <span class="total-amount">Q425.00</span>
                    <button class="btn-order-detail">Modificar orden</button>
                </div>
            </div>
        </article>

    </main>

</body>

</html>
