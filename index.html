<!DOCTYPE html>
<html lang="es">

<body>

    <header class="main-header">
        <nav class="navbar">

            <div class="nav-logo">

                <a href="index.html">
                    <h1>Campus<span>Shop</span></h1>
                </a>

            <div class="nav-search">
                <form action="#" class="search-form">

                </form>
            </div>

            <input type="checkbox" id="menu-toggle" class="menu-checkbox">
            <label for="menu-toggle" class="menu-btn">

                <span></span>
                <span></span>
            </label>

            <ul class="nav-links">
                <li><a href="index.html" class="active">Inicio</a></li>
                <li><a href="catalogo.html">Productos</a></li>
                <li><a href="contacto.html">Contacto</a></li>

                <li>

            </ul>

    </header>


        <section class="categories-container">

            </div>

            <div class="category-item">

            </div>
            <div class="category-item">
                <div class="category-icon"><img src="imagenes/z.png" alt="Zapatos" width="100%" height="100%"></div>
                <span>Zapatos</span>
            </div>
            <div class="category-item">
                <div class="category-icon"><img src="imagenes/a.png" alt="Accesorios" width="100%" height="100%"></div>
